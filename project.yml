# parameters: {}
# environment: {}
packages:
    - name: api
      shared: false
      # environment: {}
      # parameters: {}
      # annotations: {}
      environment: 
        TFE_TOKEN: "${TFE_TOKEN}"
        WORKSPACE_ID: "${WORKSPACE_ID}"
        SERVER_DOMAIN: "${SERVER_DOMAIN}"
      functions:
        - name: start
          binary: false
          main: ""
          runtime: go:1.25
          web: true
        - name: stop
          binary: false
          main: ""
          runtime: go:1.25
          web: false
        - name: status
          binary: false
          main: ""
          runtime: go:1.25
          web: true
          limits:
            memory: 128
