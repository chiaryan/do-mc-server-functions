# parameters: {}
# environment: {}
packages:
    - name: api
      shared: false
      # environment: {}
      # parameters: {}
      # annotations: {}
      environment: 
        SERVER_DOMAIN: "${RECORD}.${DOMAIN}"
        DO_TOKEN: "${DO_TOKEN}"
        ITZG_ENV: "${ITZG_ENV}"
        RECORD: "${RECORD}"
        DOMAIN: "${DOMAIN}"
        INSTANCE_NAME: "${INSTANCE_NAME}"
        INSTANCE_SSH_KEY: "${INSTANCE_SSH_KEY}"
        INSTANCE_SIZE: "${INSTANCE_SIZE}"
        INSTANCE_VOLUME_NAME: "${INSTANCE_VOLUME_NAME}"
        INSTANCE_VOLUME_ID: "${INSTANCE_VOLUME_ID}"
        STOP_ADDRESS: "${STOP_ADDRESS}"
        STOP_ADDRESS_PASSWORD_HASH: "${STOP_ADDRESS_PASSWORD_HASH}"
        STOP_ADDRESS_PASSWORD: "${STOP_ADDRESS_PASSWORD}"
      functions:
        - name: status
          binary: false
          main: ""
          runtime: go:1.25
          web: true
